{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конвертер валют</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 500px">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
    <img src="{% static 'rates/logo.webp' %}" alt="logo"
         style="height: 44px; width: 44px; object-fit: contain; border-radius: 12px;">
    <h4 class="fw-bold mb-0">Конвертер валют</h4>
</div>
        <a href="/" class="btn btn-outline-secondary btn-sm">← Назад</a>
    </div>

    <div class="card p-4">
        <form method="post">
            {% csrf_token %}
            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Сумма</label>
                <input type="number" name="amount" class="form-control"
                       placeholder="Например: 1000" step="0.01" min="0.01" required>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Из</label>
                    <select name="from_currency" class="form-select">
                        {% for cur in currencies %}
                        <option value="{{ cur }}">{{ cur }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col">
                    <label class="form-label">В</label>
                    <select name="to_currency" class="form-select">
                        {% for cur in currencies %}
                        <option value="{{ cur }}" {% if cur == "KZT" %}selected{% endif %}>{{ cur }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Комиссия (%)</label>
                <input type="number" name="commission" class="form-control"
                       value="0" step="0.1" min="0" max="100">
            </div>
            <button class="btn btn-primary w-100">Конвертировать</button>
        </form>

        {% if result %}
        <hr>
        <div class="text-center">
            <div class="text-muted small">Результат</div>
            <div class="display-6 fw-bold text-success">{{ result.result }}</div>
            <div class="text-muted small">
                Курс: {{ result.rate }} | Комиссия: {{ result.commission }}
            </div>
        </div>
        {% endif %}
    </div>
</div>
</body>
</html>
