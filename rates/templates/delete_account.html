<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удаление аккаунта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #f0f2f7; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 32px; }
        .form-control { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; font-family: inherit; }
        .form-control:focus { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.1); }
        .btn-delete { background: #dc2626; color: #fff; border: none; border-radius: 10px; padding: 10px; font-weight: 700; font-family: inherit; cursor: pointer; width: 100%; }
        .btn-back { background: transparent; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 9px 20px; font-weight: 600; text-decoration: none; color: #111827; display: inline-block; }
        .warning-box { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 12px; padding: 16px; font-size: 0.88rem; color: #92400e; margin-bottom: 20px; }
        .error-box { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 10px; padding: 12px; color: #dc2626; font-weight: 600; margin-bottom: 16px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 480px;">
    <div class="card">
        <h4 class="fw-bold mb-3" style="color:#dc2626;">🗑 Удаление аккаунта</h4>

        <div class="warning-box">
            ⚠️ Это действие <b>необратимо</b>. Все ваши данные, алерты и история будут удалены.
        </div>

        {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

        <p style="font-size:0.88rem;color:#6b7280;">
            Для подтверждения введите ваш логин: <b>{{ user.username }}</b>
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="confirm" class="form-control"
                       placeholder="Введите логин для подтверждения" required>
            </div>
            <div class="d-flex gap-3">
                <a href="/profile/" class="btn-back">Отмена</a>
                <button type="submit" class="btn-delete">Удалить навсегда</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
