<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:400px">
    <div class="card p-4 border-0 shadow-sm">
        <h4 class="fw-bold mb-4 text-center">📝 Регистрация</h4>
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Логин" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password1" class="form-control" placeholder="Пароль" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password2" class="form-control" placeholder="Повторите пароль" required>
            </div>
            <button class="btn btn-success w-100">Зарегистрироваться</button>
        </form>
        <div class="text-center mt-3">
            <a href="/login/">Уже есть аккаунт?</a>
        </div>
    </div>
</div>
</body>
</html>
