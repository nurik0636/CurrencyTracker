{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #f0f2f7; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 28px; margin-bottom: 20px; }
        .card-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 20px; }
        .form-label { font-size: 0.83rem; font-weight: 600; color: #6b7280; }
        .form-control { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 14px; font-family: inherit; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-save { background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 10px; font-weight: 700; font-family: inherit; cursor: pointer; width: 100%; }
        .btn-back { background: transparent; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 7px 16px; font-size: 0.85rem; font-weight: 600; text-decoration: none; color: #111827; }
        .success-box { background: #dcfce7; border: 1px solid #86efac; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #16a34a; font-weight: 600; margin-bottom: 16px; }
        .error-box { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #dc2626; font-weight: 600; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 560px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">✏️ Редактировать профиль</h4>
        <a href="/profile/" class="btn-back">← Назад</a>
    </div>

    {% if success %}<div class="success-box">✅ {{ success }}</div>{% endif %}
    {% if error %}<div class="error-box">⚠️ {{ error }}</div>{% endif %}

    <!-- Изменить данные -->
    <div class="card">
        <div class="card-title">👤 Личные данные</div>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="update_info">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control"
                       value="{{ user.username }}" required minlength="3" maxlength="150">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ user.email }}" required>
            </div>
            <button type="submit" class="btn-save">💾 Сохранить</button>
        </form>
    </div>

    <!-- Изменить пароль -->
    <div class="card">
        <div class="card-title">🔐 Изменить пароль</div>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="change_password">
            <div class="mb-3">
                <label class="form-label">Текущий пароль</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Новый пароль</label>
                <input type="password" name="new_password1" class="form-control" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Повторите новый пароль</label>
                <input type="password" name="new_password2" class="form-control" required>
            </div>
            <button type="submit" class="btn-save">🔑 Изменить пароль</button>
        </form>
    </div>
</div>
</body>
</html>
